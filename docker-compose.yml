services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/app-ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - blog

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blog

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blog

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SKIP_SETUP: "true"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blog

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SKIP_SETUP: "true"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blog

volumes:
  mysql_data:

networks:
  blog:
    driver: bridge
