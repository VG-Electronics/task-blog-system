openapi: 3.0.3

info:
  title: Task Blog System API
  description: |
    RESTful blog API built with Laravel 13. Provides full blogging platform functionality
    with role-based access control, automated post risk scoring, comment flagging,
    scheduled archiving, and admin reporting with export capabilities.

    ## Authentication
    This API uses **Laravel Sanctum** Bearer token authentication.
    Obtain a token via `POST /api/register` or `POST /api/login`,
    then pass it in the `Authorization` header as `Bearer <token>`.

    ## Roles
    Three roles exist: `User`, `Moderator`, `Admin`. Users can hold multiple roles.
    Role-specific restrictions are documented per endpoint.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local Docker environment

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: Registration, login, and logout
  - name: Posts
    description: Blog post management
  - name: Tags
    description: Assigning and removing tags on posts
  - name: Comments
    description: Comment management and moderation
  - name: Admin – Reporting
    description: Admin-only reporting and analytics (requires Admin role)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    Token:
      type: object
      properties:
        token:
          type: string
          example: "3|abc123xyz"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 2
        title:
          type: string
          example: My first post
        description:
          type: string
          example: A short summary of the post
        content:
          type: string
          example: Full content of the post goes here.
        risk_level:
          type: string
          nullable: true
          enum: [low, medium, high]
          example: low
        risk_score:
          type: integer
          nullable: true
          example: 25
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PostInput:
      type: object
      required:
        - title
        - description
        - content
      properties:
        title:
          type: string
          maxLength: 255
          example: My first post
        description:
          type: string
          example: A short summary of the post
        content:
          type: string
          example: Full content of the post goes here.

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 3
        post_id:
          type: integer
          example: 1
        content:
          type: string
          example: Great post!
        flag:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CommentInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: Great post!

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        tag:
          type: string
          example: news

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - The email field is required.

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
          example: Unauthenticated.

    Analytics:
      type: object
      properties:
        total_posts:
          type: integer
          example: 42
        total_comments:
          type: integer
          example: 120
        avg_comments_per_post:
          type: number
          format: float
          example: 2.86
        top_users:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nickname:
                type: string
              post_count:
                type: integer
          example:
            - id: 1
              nickname: alice
              post_count: 10
        most_common_tags:
          type: array
          items:
            type: object
            properties:
              tag:
                type: string
              count:
                type: integer
          example:
            - tag: news
              count: 15

  parameters:
    PostId:
      name: post
      in: path
      required: true
      description: Post ID
      schema:
        type: integer
        example: 1

    CommentId:
      name: comment
      in: path
      required: true
      description: Comment ID
      schema:
        type: integer
        example: 1

    TagName:
      name: tag
      in: path
      required: true
      description: Tag name (created automatically if it does not exist)
      schema:
        type: string
        example: news

    ReportFormat:
      name: format
      in: query
      description: Response format
      schema:
        type: string
        enum: [json, csv, xls]
        default: json

    SortBy:
      name: sort_by
      in: query
      description: Field to sort by
      schema:
        type: string
        enum: [created_at, updated_at]
        default: created_at

    SortDir:
      name: sort_dir
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: desc

    DateFrom:
      name: from
      in: query
      description: Filter records from this date (ISO 8601)
      schema:
        type: string
        format: date
        example: "2024-01-01"

    DateTo:
      name: to
      in: query
      description: Filter records up to this date (ISO 8601)
      schema:
        type: string
        format: date
        example: "2024-12-31"

    FilteringLogic:
      name: filtering_logic
      in: query
      description: How multiple filters are combined
      schema:
        type: string
        enum: [and, or]
        default: and

    UserRole:
      name: user_role
      in: query
      description: Filter by the role of the author
      schema:
        type: string
        enum: [User, Moderator, Admin]

paths:

  /ping:
    get:
      tags:
        - Health
      summary: Health check
      description: Public endpoint to verify the API is reachable and the server is running.
      operationId: ping
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK

  /register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new account and returns a Bearer token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nickname
                - email
                - password
                - password_confirmation
              properties:
                nickname:
                  type: string
                  maxLength: 255
                  example: johndoe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  minLength: 8
                  example: secret123
                password_confirmation:
                  type: string
                  example: secret123
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates the user and returns a Bearer token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Invalidates the current Bearer token.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /posts:
    get:
      tags:
        - Posts
      summary: List posts
      description: Returns all non-archived, non-deleted posts. Public endpoint.
      operationId: listPosts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      tags:
        - Posts
      summary: Create post
      description: |
        Creates a new post. Requires authentication.
        Dispatches the `CalculatePostRisk` background job asynchronously after creation —
        the `risk_level` and `risk_score` fields will be populated once the job completes.
      operationId: createPost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /posts/{post}:
    get:
      tags:
        - Posts
      summary: Get post
      description: Returns a single post by ID. Public endpoint.
      operationId: getPost
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    put:
      tags:
        - Posts
      summary: Update post
      description: |
        Updates an existing post. Requires authentication.
        Only the post owner or an Admin may update the post.
        Re-dispatches `CalculatePostRisk` after update.
      operationId: updatePost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — not the owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    delete:
      tags:
        - Posts
      summary: Delete post
      description: |
        Soft-deletes a post. Requires authentication.
        Only the post owner or an Admin may delete the post.
      operationId: deletePost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "204":
          description: Post deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — not the owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /posts/{post}/tags/{tag}:
    post:
      tags:
        - Tags
      summary: Assign tag to post
      description: |
        Assigns a tag to a post. If the tag does not exist it is created automatically.
        Requires authentication.
        Allowed: the post owner, any Moderator, any Admin.
      operationId: assignTag
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/TagName"
      responses:
        "200":
          description: Tag assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    delete:
      tags:
        - Tags
      summary: Remove tag from post
      description: |
        Removes a tag from a post. Requires authentication.
        Allowed: the post owner, any Moderator, any Admin.
      operationId: unassignTag
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/TagName"
      responses:
        "204":
          description: Tag removed
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post or tag not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /posts/{post}/comments:
    get:
      tags:
        - Comments
      summary: List comments for a post
      description: Returns all non-deleted comments for the given post. Public endpoint.
      operationId: listComments
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    post:
      tags:
        - Comments
      summary: Add comment
      description: Adds a comment to a post. Requires authentication.
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /posts/{post}/comments/{comment}:
    get:
      tags:
        - Comments
      summary: Get comment
      description: Returns a single comment. Public endpoint.
      operationId: getComment
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Comment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Post or comment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    put:
      tags:
        - Comments
      summary: Update comment
      description: |
        Updates a comment. Requires authentication.
        Only the comment owner or an Admin may edit the comment.
      operationId: updateComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — not the owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post or comment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    delete:
      tags:
        - Comments
      summary: Delete comment
      description: |
        Soft-deletes a comment. Requires authentication.
        Allowed: the comment owner, any Moderator, any Admin.
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/CommentId"
      responses:
        "204":
          description: Comment deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post or comment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /posts/{post}/comments/{comment}/flag:
    post:
      tags:
        - Comments
      summary: Flag comment
      description: |
        Sets `flag = true` on a comment, marking it for review.
        Requires authentication. Allowed: Moderator, Admin.
      operationId: flagComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Comment flagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — requires Moderator or Admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post or comment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    delete:
      tags:
        - Comments
      summary: Unflag comment
      description: |
        Sets `flag = false` on a comment, clearing the review flag.
        Requires authentication. Allowed: Moderator, Admin.
      operationId: unflagComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Comment unflagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — requires Moderator or Admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Post or comment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /admin/reporting/posts:
    get:
      tags:
        - Admin – Reporting
      summary: Post report
      description: |
        Returns a filterable, sortable report of posts.
        Requires authentication and the **Admin** role.
        Supports export to JSON, CSV, or Excel (`xls`).
      operationId: reportPosts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportFormat"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDir"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilteringLogic"
        - $ref: "#/components/parameters/UserRole"
        - name: risk_level
          in: query
          description: Filter by post risk level
          schema:
            type: string
            enum: [low, medium, high]
        - name: min_comments
          in: query
          description: Minimum number of comments on the post
          schema:
            type: integer
            example: 5
      responses:
        "200":
          description: |
            Post report. Content type depends on `format`:
            - `json` → `application/json`
            - `csv` → `text/csv` (file download)
            - `xls` → `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` (file download)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — requires Admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /admin/reporting/comments:
    get:
      tags:
        - Admin – Reporting
      summary: Comment report
      description: |
        Returns a filterable, sortable report of comments.
        Requires authentication and the **Admin** role.
        Supports export to JSON, CSV, or Excel (`xls`).
      operationId: reportComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportFormat"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDir"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilteringLogic"
        - $ref: "#/components/parameters/UserRole"
        - name: flag
          in: query
          description: Filter by flagged status
          schema:
            type: boolean
      responses:
        "200":
          description: |
            Comment report. Content type depends on `format`:
            - `json` → `application/json`
            - `csv` → `text/csv` (file download)
            - `xls` → `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` (file download)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Forbidden — requires Admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /admin/reporting/analytics:
    get:
      tags:
        - Admin – Reporting
      summary: Analytics summary
      description: |
        Returns aggregate statistics: total posts/comments, average comments per post,
        top posting users, and most commonly used tags.
        Requires authentication and the **Admin** role.
      operationId: reportAnalytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
